<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Kho - MAY PTB</title>
    <!-- Link logo của bạn -->
    <link rel="icon" href="https://dcanktmay.github.io/KhoMayPTB/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #f0f2f5;
        }
        .container {
            text-align: center; padding: 50px 40px;
            background: white; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px; width: 90%;
        }
        .logo { width: 120px; height: auto; margin-bottom: 20px; }
        h1 { color: #1a73e8; font-size: 24px; margin-bottom: 10px; }
        p { color: #5f6368; font-size: 15px; margin-bottom: 35px; line-height: 1.5; }
        .btn-start {
            display: inline-block; padding: 15px 35px;
            font-size: 16px; font-weight: bold; color: white;
            background-color: #1a73e8; text-decoration: none;
            border-radius: 8px; transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(26,115,232,0.3);
        }
        .btn-start:hover {
            background-color: #1557b0;
            box-shadow: 0 6px 12px rgba(26,115,232,0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Hiện thị logo của bạn -->
        <img class="logo" src="https://dcanktmay.github.io/KhoMayPTB/logo.png" alt="Logo MAY PBT">

        <!-- THAY ĐƯỜNG LINK /EXEC CỦA BẠN VÀO DÒNG BÊN DƯỚI -->

            🚀 MỞ TRANG QUẢN LÝ
        </a>

</body>
